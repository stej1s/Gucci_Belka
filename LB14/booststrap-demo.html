<!DOCTYPE html>
<html lang="uk">

<head>
  <meta charset="UTF-8">

  <!-- ОБОВ’ЯЗКОВО для адаптиву -->
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Lab 14 - Bootstrap</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- Свій CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body class="d-flex flex-column min-vh-100">

  <header class="bg-dark text-white p-3 text-center">
    <h1>Сайт на Bootstrap</h1>
  </header>

  <main class="flex-grow-1">

    <!-- ===== КАРТКИ (BOOTSTRAP) ===== -->
    <div class="container mt-5">
      <h2 class="text-center mb-4">Наші послуги</h2>

      <div class="row g-4">

        <div class="col-12 col-md-4">
          <div class="card h-100 shadow-sm">
            <div class="card-body text-center">
              <i class="fa-solid fa-code fa-3x text-primary mb-3"></i>
              <h5 class="card-title">Розробка</h5>
              <p class="card-text">Створення сайтів</p>
              <a href="#" class="btn btn-primary">Детальніше</a>
            </div>
          </div>
        </div>

        <div class="col-12 col-md-4">
          <div class="card h-100 shadow-sm">
            <div class="card-body text-center">
              <i class="fa-solid fa-paintbrush fa-3x text-success mb-3"></i>
              <h5 class="card-title">Дизайн</h5>
              <p class="card-text">UI/UX дизайн</p>
              <a href="#" class="btn btn-success">Детальніше</a>
            </div>
          </div>
        </div>

        <div class="col-12 col-md-4">
          <div class="card h-100 shadow-sm">
            <div class="card-body text-center">
              <i class="fa-solid fa-chart-line fa-3x text-danger mb-3"></i>
              <h5 class="card-title">Маркетинг</h5>
              <p class="card-text">Просування сайтів</p>
              <a href="#" class="btn btn-danger">Детальніше</a>
            </div>
          </div>
        </div>

      </div>
    </div>

    <!-- ===== SVG ===== -->
    <div class="container text-center mt-5">
      <h3>SVG іконка</h3>

      <svg class="my-svg-icon" width="100" height="100" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="40" stroke="black" stroke-width="3" fill="#ffc107" />
      </svg>
    </div>

  </main>

  <!-- ===== FOOTER ===== -->
  <footer class="mt-auto bg-dark text-white p-3 text-center">
    © 2026 Мій сайт на Bootstrap
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
